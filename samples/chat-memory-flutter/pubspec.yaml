name: dazzle_chat_memory_flutter
description: >
  Chat-memory sample — pure conversational memory backed by a Dazzle
  ContextStore. Same behaviour as samples/chat-memory/{android,ios},
  ported to Flutter.
publish_to: 'none'
version:    1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dazzle_flutter:
    path: ../../sdk/flutter/dazzle_flutter
  dazzle_samples_shared:
    path: ../_shared/flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
