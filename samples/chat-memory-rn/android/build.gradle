buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        google()
        mavenCentral()
        // Local file-URL maven repo produced by
        // `samples/_scripts/link_rn.sh android`. Same mechanism the
        // Flutter samples use — disappears once the Dazzle SDK lives
        // on a public Maven repo.
        maven { url = uri("$rootDir/../../../sdk/android/build/maven-repo") }
    }
}
