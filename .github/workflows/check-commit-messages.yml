name: Validate — commit messages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-commit-messages:
    name: Check for LLM attribution patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="origin/main..$AFTER"
            else
              RANGE="$BEFORE..$AFTER"
            fi
          fi
          echo "range=$RANGE" >> $GITHUB_OUTPUT

      - name: Scan commits for LLM attribution
        run: |
          REGEX='\b(co-authored-by|claude|anthropic|generated with)\b|noreply@anthropic\.com'
          RANGE="${{ steps.range.outputs.range }}"

          # Extended format: subject, body, trailers, author, committer
          OUTPUT=$(git log --format="%H%n  Subject: %s%n  Body: %b%n  Trailers: %(trailers:only)%n  Author: %an <%ae>%n  Committer: %cn <%ce>" "$RANGE" 2>/dev/null | grep -iE "$REGEX" || true)

          if [ -n "$OUTPUT" ]; then
            echo "::error::Commits contain LLM attribution patterns (co-authored-by, claude, anthropic, generated with, noreply@anthropic.com)"
            echo ""
            echo "Offending lines:"
            echo "$OUTPUT" | sed 's/^/  /'
            echo ""
            echo "See: docs/COMMIT_POLICY.md"
            exit 1
          fi

          echo "✅ All commits passed validation"
