name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    name: C — clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          find core/ -name "*.c" -o -name "*.h" | xargs clang-format --dry-run --Werror

  ktlint:
    name: Kotlin — ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/
      - name: Run ktlint
        run: ktlint "sdk/android/src/**/*.kt"

  swiftlint:
    name: Swift — swiftlint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install swiftlint
        run: brew install swiftlint
      - name: Run swiftlint
        run: swiftlint lint --path sdk/ios/Sources --strict
