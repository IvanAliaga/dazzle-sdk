name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required by softprops/action-gh-release to create / update GitHub Releases

jobs:
  # Make sure the committed dazzle.wasm / dazzle.js artefacts in
  # sdk/flutter/dazzle_flutter/web/native/ and the RN equivalent are still
  # in sync with core/web/src/dazzle_wasm.cpp. Anyone editing the C++
  # source has to regenerate the WASM locally (./core/web/build.sh) and
  # commit the result; otherwise this job fails the release.
  wasm-check:
    name: Verify dazzle.wasm matches source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - name: Build WASM
        run: bash core/web/build.sh
      - name: Verify committed artefacts are up to date
        run: |
          if ! git diff --quiet -- sdk/flutter/dazzle_flutter/web/native sdk/react-native/dazzle-react-native/web/native; then
            echo "::error::core/web/src/dazzle_wasm.cpp changed but the committed .wasm/.js were not regenerated."
            echo "Run ./core/web/build.sh locally and commit sdk/{flutter,react-native}/.../web/native/."
            git diff --stat -- sdk/flutter/dazzle_flutter/web/native sdk/react-native/dazzle-react-native/web/native
            exit 1
          fi
          echo "✓ WASM artefacts in sync."

  release-ios:
    name: Build & publish iOS XCFramework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Build XCFramework
        working-directory: sdk/ios
        run: bash build.sh
      - name: Zip XCFramework
        run: zip -r Dazzle-${{ github.ref_name }}.xcframework.zip sdk/ios/Dazzle.xcframework
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Dazzle-${{ github.ref_name }}.xcframework.zip

  release-android:
    name: Build & publish Android AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
      - name: Assemble release AAR
        working-directory: sdk/android
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: sdk/android/build/outputs/aar/dazzle-release.aar
