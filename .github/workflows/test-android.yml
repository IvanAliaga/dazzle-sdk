name: Test — Android

on:
  push:
    branches: [main]
    paths:
      - "sdk/android/**"
      - "core/**"
  pull_request:
    branches: [main]
    paths:
      - "sdk/android/**"
      - "core/**"

jobs:
  build:
    name: Assemble AAR + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('sdk/android/**/*.gradle.kts', 'sdk/android/**/gradle-wrapper.properties') }}
      - name: Assemble debug AAR
        working-directory: sdk/android
        run: ./gradlew :dazzle:assembleDebug --no-daemon
      - name: Run unit tests
        working-directory: sdk/android
        run: ./gradlew :dazzle:test --no-daemon
      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: dazzle-debug.aar
          path: sdk/android/build/outputs/aar/dazzle-debug.aar
