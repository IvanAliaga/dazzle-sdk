# Valkey Mobile-Optimized Configuration
# Tuned for Android devices running via Termux or embedded

# --- Network ---
bind 127.0.0.1
port 6379
protected-mode yes
tcp-backlog 128
timeout 300
tcp-keepalive 60

# --- Memory ---
maxmemory 64mb
maxmemory-policy allkeys-lru
# Smaller hash/list thresholds to save memory
hash-max-listpack-entries 64
hash-max-listpack-value 32
list-max-listpack-size -2
zset-max-listpack-entries 64
zset-max-listpack-value 32
stream-node-max-bytes 2048
stream-node-max-entries 50

# --- Persistence (AOF) ---
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 16mb
aof-use-rdb-preamble yes

# --- Persistence (RDB) - Disabled to save battery/flash wear ---
save ""

# --- Performance ---
# Lower hz = less CPU usage, better for battery
hz 10
dynamic-hz yes
# Fewer databases since mobile apps rarely need 16
databases 4

# --- Logging ---
loglevel notice
logfile ""

# --- Cluster - Disabled for mobile ---
# cluster-enabled no

# --- Latency monitoring ---
latency-monitor-threshold 50

# --- Slow log ---
slowlog-log-slower-than 10000
slowlog-max-len 32

# --- Client output buffer limits ---
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 0 0 0
client-output-buffer-limit pubsub 8mb 2mb 60

# --- Threads - Single threaded for mobile ---
# io-threads 1
