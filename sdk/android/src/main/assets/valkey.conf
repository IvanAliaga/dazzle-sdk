# Valkey Mobile-Optimized Configuration
# Tuned for Android devices running via Termux or embedded

# --- Network ---
bind 127.0.0.1
port 6379
protected-mode yes
tcp-backlog 128
timeout 300
tcp-keepalive 60

# --- Memory ---
maxmemory 64mb
maxmemory-policy allkeys-lru
# Smaller hash/list thresholds to save memory
hash-max-listpack-entries 64
hash-max-listpack-value 32
list-max-listpack-size -2
zset-max-listpack-entries 64
zset-max-listpack-value 32
stream-node-max-bytes 2048
stream-node-max-entries 50

# --- Persistence (AOF) ---
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 16mb
aof-use-rdb-preamble yes

# --- Persistence (RDB) - Disabled to save battery/flash wear ---
save ""

# --- Performance ---
# Lower hz = less CPU usage, better for battery
hz 10
dynamic-hz yes
# Fewer databases since mobile apps rarely need 16
databases 4

# --- Logging ---
loglevel notice
logfile ""

# --- Cluster - Disabled for mobile ---
# cluster-enabled no

# --- Latency monitoring (disabled) ---
# Both the latency-events dict and the per-command hdr_histogram are shared
# across threads but are NOT protected when parallel reads are enabled — the
# worker pool (core/transport/dazzle_worker_pool.c) only guards the keyspace
# via a per-slot rwlock.  Disable on-device since no valkey-cli consumer
# queries these on a mobile deployment.
latency-monitor-threshold 0
latency-tracking no

# --- Commandlog (slow / large-request / large-reply — all disabled) ---
# server.commandlog[type].entries is a doubly-linked list that call() mutates
# via listAddNodeHead + listDelNode(listLast()).  Without a global lock,
# concurrent workers hitting the trim path corrupted the list (SIGSEGV at
# adlist.c:203 'node->next->prev == node').  Setting threshold < 0 disables
# the list writes entirely — see commandlog.c:104.
slowlog-log-slower-than -1
slowlog-max-len 0
commandlog-request-larger-than -1
commandlog-reply-larger-than -1

# --- Client output buffer limits ---
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 0 0 0
client-output-buffer-limit pubsub 8mb 2mb 60

# --- Threads - Single threaded for mobile ---
# io-threads 1
