name: DazzleDemo
options:
  bundleIdPrefix: io.dazzle
  # The Dazzle Swift SDK uses @Observable / NavigationStack / Duration
  # which all require iOS 17. Mirrors the SPM manifest platform pin.
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"

targets:
  DazzleDemo:
    type: application
    platform: iOS
    sources:
      - DazzleDemo
      # Include the whole Dazzle Swift SDK (DazzleServer, DazzleConfig,
      # DazzlePrimitives, Transport, ValkeyVersion) plus the C bridge.
      - path: ../Sources
        group: Dazzle
      - path: ../../../core/platform/dazzle_ios.c
        group: Dazzle
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      DEVELOPMENT_TEAM: H886H7AS9G
      CODE_SIGN_STYLE: Automatic
      OTHER_LDFLAGS:
        # libvalkey-server.a pulls in hnswlib / simsimd / zlib. libc++ is
        # needed by the HNSW + SQ8 C++ sources; libz by Valkey's RDB
        # compression path. Same set Package.swift declares on the
        # canonical SPM target.
        - -lc++
        - -lz
    dependencies:
      - framework: ../Dazzle.xcframework
        embed: false
