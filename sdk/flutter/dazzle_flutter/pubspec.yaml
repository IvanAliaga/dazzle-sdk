name:        dazzle_flutter
description: >
  Dazzle SDK for Flutter. Embedded in-process database with HNSW vector
  search and a ChatAgent runtime for on-device LLM agents. Links the
  same libdazzle.so / Dazzle.xcframework the native Android and iOS
  SDKs ship — zero behaviour drift across platforms. Includes five
  swappable LLMClient adapters: LlamaCpp (GGUF), LiteRT-LM,
  FoundationModels (iOS 26+), OpenAI-compatible, and Anthropic.
version:     1.0.0-beta.5
homepage:    https://github.com/IvanAliaga/dazzle-sdk
repository:  https://github.com/IvanAliaga/dazzle-sdk
issue_tracker: https://github.com/IvanAliaga/dazzle-sdk/issues
documentation: https://github.com/IvanAliaga/dazzle-sdk/tree/main/docs/sdk

# Topics surface this package on pub.dev category pages — at most 5.
topics:
  - llm
  - agent
  - embedded-database
  - vector-search
  - on-device-ai

# Funding (optional) — remove this block if you don't use sponsors.
# funding:
#   - https://github.com/sponsors/IvanAliaga

environment:
  # 3.6.0 is the minimum that supports JSArray.withLength used by the
  # web-target js_interop bindings.
  sdk:     ">=3.6.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  ffi:                        ^2.1.0
  # OpenAICompatibleClient — pure Dart HTTP, no native deps.
  http:                       ^1.2.0
  # web target — js_interop is in dart:* but `package:web` is the typed
  # browser API surface (replaces the deprecated dart:html).
  web:                        ^1.1.0
  # flutter_web_plugins — required by the platforms.web plugin entry.
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  ffigen:        ^13.0.0

flutter:
  plugin:
    platforms:
      android:
        package:    dev.dazzle.flutter
        pluginClass: DazzleFlutterPlugin
      ios:
        pluginClass: DazzleFlutterPlugin
      web:
        pluginClass: DazzleWebPlugin
        fileName:    src/web/plugin_web.dart

  # Native WASM module + JS loader, served as static assets.  The Dart web
  # bridge fetches `assets/packages/dazzle_flutter/web/native/dazzle.js`
  # from a Flutter Web build.
  assets:
    - web/native/dazzle.js
    - web/native/dazzle.wasm
